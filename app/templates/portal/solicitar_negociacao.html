{% extends "layouts/base_cliente.html" %}

{% block title %}Solicitar Negociação{% endblock %}

{% block content %}

<div class="topo-app">

    <h1>🤝 Solicitar Negociação</h1>

    <p>

        Envie sua proposta para análise da locadora.

    </p>

</div>

<div class="premium-card">

<form method="POST">

    <div class="info">

        <small>PARCELA</small>

        <h2>

            {{ parcela.numero }}

        </h2>

    </div>

    <div class="info">

        <small>VALOR ATUAL</small>

        <h2>

            R$ {{ "%.2f"|format(parcela.valor) }}

        </h2>

    </div>

    <div class="campo">

        <label>

            Quanto você consegue pagar?

        </label>

        <input
            type="number"
            step="0.01"
            name="valor_proposto"
            required>

    </div>

    <div class="campo">

        <label>

            Nova data desejada

        </label>

        <input
            type="date"
            name="nova_data"
            required>

    </div>

    <div class="campo">

        <label>

            Motivo

        </label>

        <textarea
            name="motivo"
            rows="5"
            required></textarea>

    </div>

    <button
        class="btn-enviar">

        📨 Enviar Solicitação

    </button>

</form>

</div>

<style>

.topo-app{

    margin-bottom:25px;

}

.topo-app p{

    color:#64748b;

}

.premium-card{

    background:#fff;

    border-left:6px solid #ff6a00;

    border-radius:24px;

    padding:28px;

    box-shadow:0 18px 40px rgba(15,23,42,.06);

}

.info{

    margin-bottom:22px;

}

.info small{

    color:#64748b;

    font-weight:900;

}

.campo{

    margin-bottom:22px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:900;

}

input,
textarea{

    width:100%;

    border:1px solid #d1d5db;

    border-radius:14px;

    padding:15px;

    font-size:15px;

}

textarea{

    resize:none;

}

.btn-enviar{

    width:100%;

    border:none;

    background:#ff6a00;

    color:#fff;

    border-radius:14px;

    padding:17px;

    font-size:16px;

    font-weight:900;

    cursor:pointer;

}

.btn-enviar:hover{

    background:#ea580c;

}

</style>

{% endblock %}
