{% extends "layouts/base_admin.html" %}

{% block title %}Editar Despesa{% endblock %}
{% block topbar_title %}Editar Despesa{% endblock %}

{% block content %}

<form method="POST">

<div class="page-header">

    <div>

        <h1>

            Editar Despesa

        </h1>

        <p>

            Atualize as informações da despesa.

        </p>

    </div>

</div>

<div class="premium-card">

    <div class="form-grid">

        <div>

            <label>

                Veículo

            </label>

            <select
            name="veiculo_id"
            class="form-select">

                {% for v in veiculos %}

                <option
                value="{{ v.id }}"
                {% if v.id == despesa.veiculo_id %}selected{% endif %}>

                    {{ v.placa }}

                    -

                    {{ v.modelo.nome }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div>

            <label>

                Tipo

            </label>

            <select
            name="tipo"
            class="form-select">

                {% for t in [

                "Oficina",

                "Pneus",

                "Lavagem",

                "Combustível",

                "Energia",

                "Seguro",

                "IPVA",

                "Licenciamento",

                "Multa",

                "Acessórios",

                "Outros"

                ] %}

                <option
                value="{{ t }}"
                {% if despesa.tipo == t %}selected{% endif %}>

                    {{ t }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div>

            <label>

                Valor

            </label>

            <input
            type="number"
            step="0.01"
            name="valor"
            value="{{ despesa.valor }}"
            class="form-control">

        </div>

        <div>

            <label>

                Data

            </label>

            <input
            type="date"
            name="data"
            value="{{ despesa.data }}"
            class="form-control">

        </div>

    </div>

    <div style="margin-top:20px;">

        <label>

            Observações

        </label>

        <textarea
        name="observacoes"
        rows="5"
        class="form-control">{{ despesa.observacoes }}</textarea>

    </div>

    <div
    style="
    display:flex;
    justify-content:flex-end;
    gap:15px;
    margin-top:30px;">

        <a
        href="{{ url_for('despesas.listar_despesas') }}"
        class="btn-premium">

            Voltar

        </a>

        <button
        type="submit"
        class="btn-premium">

            💾 Atualizar Despesa

        </button>

    </div>

</div>

</form>

{% endblock %}
