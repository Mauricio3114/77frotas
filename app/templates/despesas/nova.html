{% extends "layouts/base_admin.html" %}

{% block title %}Nova Despesa{% endblock %}
{% block topbar_title %}Nova Despesa{% endblock %}

{% block content %}

<form method="POST">

<div class="page-header">

<h1>Nova Despesa</h1>

</div>

<div class="premium-card">

<div class="form-grid">

<div>

<label>Veículo</label>

<select
name="veiculo_id"
class="form-select">

{% for v in veiculos %}

<option value="{{ v.id }}">

{{ v.placa }}

- {{ v.modelo.nome }}

</option>

{% endfor %}

</select>

</div>

<div>

<label>Tipo</label>

<select
name="tipo"
class="form-select">

<option>Oficina</option>
<option>Pneus</option>
<option>Lavagem</option>
<option>Combustível</option>
<option>Energia</option>
<option>Seguro</option>
<option>IPVA</option>
<option>Licenciamento</option>
<option>Multa</option>
<option>Acessórios</option>
<option>Outros</option>

</select>

</div>

<div>

<label>Valor</label>

<input
type="number"
step="0.01"
name="valor"
class="form-control">

</div>

<div>

<label>Data</label>

<input
type="date"
name="data"
class="form-control">

</div>

</div>

<div style="margin-top:20px;">

<label>Observações</label>

<textarea
name="observacoes"
rows="4"
class="form-control"></textarea>

</div>

<div
style="margin-top:25px;text-align:right;">

<button
class="btn-premium">

Salvar

</button>

</div>

</div>

</form>

{% endblock %}
