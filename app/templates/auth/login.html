<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>77 Frotas | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 390px;
            background: #ffffff;
            border-radius: 24px;
            padding: 34px;
            box-shadow: 0 25px 70px rgba(0,0,0,.35);
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand h1 {
            margin: 0;
            font-size: 34px;
            color: #0f172a;
            font-weight: 900;
        }

        .brand p {
            margin: 6px 0 0;
            color: #64748b;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: #334155;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            height: 46px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 0 14px;
            margin-bottom: 16px;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            height: 48px;
            border: 0;
            border-radius: 16px;
            background: #0f172a;
            color: white;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
        }

        .alert {
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 14px;
            font-size: 14px;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand">
        <h1>77 Frotas</h1>
        <p>Gestão inteligente de locações</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>E-mail</label>
        <input type="email" name="email" required>

        <label>Senha</label>
        <input type="password" name="senha" required>

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
