<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>77 Frotas | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --orange:#ff6a00;
    --orange2:#ff8c1a;
    --dark:#070b17;
    --dark2:#111827;
    --white:#ffffff;
    --gray:#64748b;
}

body{
    min-height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    radial-gradient(circle at top,#23304d 0%,transparent 45%),
    linear-gradient(160deg,#020617 0%,#0f172a 60%,#111827 100%);
    position:relative;
}

body:before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    background:rgba(255,106,0,.08);
    top:-280px;
    right:-220px;
    filter:blur(40px);
}

body:after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,.04);
    bottom:-220px;
    left:-150px;
    filter:blur(30px);
}

.login-card{

    position:relative;
    z-index:10;

    width:100%;
    max-width:430px;

    padding:45px;

    border-radius:32px;

    background:rgba(255,255,255,.97);

    box-shadow:
    0 40px 90px rgba(0,0,0,.45);

    animation:fade .5s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:none;

}

}

.logo{

width:120px;
display:block;
margin:auto;

}

.brand{

text-align:center;
margin-bottom:30px;

}

.brand h1{

margin-top:18px;
font-size:42px;
font-weight:900;
color:#0f172a;
letter-spacing:-1px;

}

.brand p{

margin-top:8px;
color:#64748b;
font-size:16px;

}

.tag{

display:inline-block;

margin-top:14px;

padding:8px 18px;

border-radius:999px;

background:#fff3eb;

color:var(--orange);

font-size:12px;

font-weight:800;

letter-spacing:.08em;

text-transform:uppercase;

}

label{

display:block;

margin-bottom:8px;
margin-top:18px;

font-size:13px;

font-weight:900;

color:#1e293b;

}

input{

width:100%;

height:56px;

border:1px solid #e5e7eb;

border-radius:18px;

padding:0 18px;

font-size:15px;

transition:.25s;

outline:none;

}

input:focus{

border-color:var(--orange);

box-shadow:0 0 0 5px rgba(255,106,0,.12);

}

button{

margin-top:25px;

width:100%;

height:58px;

border:0;

border-radius:18px;

cursor:pointer;

font-size:17px;

font-weight:900;

color:white;

background:linear-gradient(135deg,#ff6a00,#ff8c1a);

box-shadow:0 18px 35px rgba(255,106,0,.35);

transition:.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 24px 45px rgba(255,106,0,.45);

}

.alert{

margin-bottom:18px;

padding:14px;

border-radius:16px;

background:#fee2e2;

color:#991b1b;

font-size:14px;

font-weight:700;

}

.footer{

margin-top:28px;

text-align:center;

font-size:13px;

color:#64748b;

line-height:1.6;

}

.footer strong{

color:#ff6a00;

}

@media(max-width:600px){

body{

padding:18px;

}

.login-card{

padding:32px 24px;

border-radius:26px;

}

.brand h1{

font-size:36px;

}

.logo{

width:95px;

}

}
</style>
</head>
<body>

<div class="login-card">
    <div class="brand">
        <h1>77 Frotas</h1>
        <p>Gestão inteligente de locações</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>E-mail</label>
        <input type="email" name="email" required>

        <label>Senha</label>
        <input type="password" name="senha" required>

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
